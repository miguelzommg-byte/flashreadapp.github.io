<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    color: #0D1117;
    background:
      radial-gradient(ellipse at 15% 0%, #FBE9E3 0%, transparent 60%),
      radial-gradient(ellipse at 85% 100%, #F5DDD3 0%, transparent 55%),
      linear-gradient(165deg, #F7F4F0 0%, #F0EBE0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Floating "word" marks evoking RSVP reading */
  .floater {
    position: absolute;
    pointer-events: none;
    color: #E06B47;
    opacity: 0.18;
    font-weight: 800;
    font-style: italic;
    user-select: none;
    letter-spacing: -0.02em;
    animation: drift 8s ease-in-out infinite;
  }
  .floater.f1 { top: 12%; left: 8%; font-size: 28px; animation-delay: 0s; }
  .floater.f2 { top: 22%; right: 12%; font-size: 22px; animation-delay: 1.5s; }
  .floater.f3 { bottom: 28%; left: 10%; font-size: 32px; animation-delay: 3s; }
  .floater.f4 { bottom: 16%; right: 8%; font-size: 26px; animation-delay: 2s; }
  .floater.f5 { top: 55%; left: 6%; font-size: 20px; animation-delay: 4s; }
  .floater.f6 { top: 8%; right: 32%; font-size: 18px; animation-delay: 5s; }
  @keyframes drift {
    0%, 100% { transform: translateX(0) translateY(0); opacity: 0.12; }
    50% { transform: translateX(8px) translateY(-6px); opacity: 0.25; }
  }

  .card {
    background: rgba(255, 252, 250, 0.78);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(232, 226, 219, 0.9);
    border-radius: 24px;
    padding: 44px 36px 32px;
    max-width: 440px;
    width: 100%;
    box-shadow:
      0 24px 50px -16px rgba(224, 107, 71, 0.22),
      0 6px 14px -6px rgba(13, 17, 23, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 1);
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .icon-wrap {
    width: 112px;
    height: 112px;
    margin: 0 auto 24px;
    border-radius: 26px;
    overflow: hidden;
    box-shadow:
      0 14px 28px -8px rgba(224, 107, 71, 0.4),
      0 0 0 1px rgba(232, 226, 219, 0.9);
  }
  .icon-wrap img { width: 100%; height: 100%; display: block; }

  h1 {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -0.035em;
    color: #0D1117;
    line-height: 0.98;
    margin-bottom: 10px;
  }
  h1 .flash {
    color: #E06B47;
    font-style: italic;
  }

  .tagline {
    font-size: 16px;
    font-weight: 500;
    color: #6B7280;
    margin-bottom: 28px;
    letter-spacing: -0.005em;
    line-height: 1.4;
  }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .store-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 15px 24px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    border: none;
    cursor: pointer;
    position: relative;
  }
  .store-btn:active { transform: scale(0.97); }

  .store-btn.ios {
    background: #0D1117;
    color: #FFFFFF;
    box-shadow: 0 6px 16px -4px rgba(13, 17, 23, 0.3);
  }
  .store-btn.android {
    background: #FFFFFF;
    color: #0D1117;
    box-shadow: 0 6px 16px -4px rgba(224, 107, 71, 0.15);
    border: 1px solid #E8E2DB;
  }
  .store-btn.recommended {
    box-shadow:
      0 0 0 3px rgba(255, 252, 250, 1),
      0 0 0 5px #E06B47,
      0 10px 24px -6px rgba(224, 107, 71, 0.5);
    transform: translateY(-2px);
  }
  .store-btn.recommended::after {
    content: "for you";
    position: absolute;
    top: -10px;
    right: 14px;
    background: #E06B47;
    color: white;
    font-size: 10px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    box-shadow: 0 4px 10px -2px rgba(196, 82, 42, 0.6);
  }
  .store-btn .logo { width: 22px; height: 22px; flex-shrink: 0; }
  .store-btn .text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
  .store-btn .text .small { font-size: 10px; opacity: 0.7; font-weight: 600; letter-spacing: 0.05em; }
  .store-btn .text .big { font-size: 16px; font-weight: 800; }

  .footer-note {
    font-size: 12px;
    color: #9CA3AF;
    margin-top: 16px;
    line-height: 1.6;
  }
  .footer-note a {
    color: #E06B47;
    text-decoration: none;
    font-weight: 600;
  }
  .footer-note a:hover { text-decoration: underline; }

  @media (max-width: 420px) {
    .card { padding: 36px 24px 24px; border-radius: 20px; }
    h1 { font-size: 40px; }
    .icon-wrap { width: 96px; height: 96px; }
  }
</style>
</head>
