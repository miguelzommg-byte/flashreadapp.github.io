<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get FlashRead</title>
<meta name="description" content="Read 3x faster with FlashRead. Available on iOS and Android.">
<meta name="apple-itunes-app" content="app-id=6761858322">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 100%);color:#fff}
body{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;text-align:center}
.logo{font-size:48px;font-weight:800;color:#a78bfa;margin-bottom:8px}
.tagline{font-size:18px;color:#b8b8c8;margin-bottom:40px;max-width:400px;line-height:1.5}
.buttons{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px}
.btn{display:flex;align-items:center;justify-content:center;padding:16px 24px;border-radius:14px;font-size:16px;font-weight:600;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.btn-ios{background:#fff;color:#000}
.btn-android{background:#34a853;color:#fff}
.redirecting{margin-top:32px;font-size:14px;color:#8a8aa0}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#a78bfa;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{t{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="logo">FlashRead</div>
<div class="tagline">Read 3x faster with focused, distraction-free speed reading.</div>
<div class="buttons" id="buttons" style="display:none">
<a class="btn btn-ios" id="iosBtn" href="#">Download on the App Store</a>
<a class="btn btn-android" id="androidBtn" href="#">Get it on Google Play</a>
</div>
<div class="redirecting" id="redirecting"><span class="spinner"></span> Opening your app store...</div>
<script>
var IOS_URL="https://apps.apple.com/us/app/id6761858322";
var ANDROID_URL="https://play.google.com/store/apps/details?id=com.flashreadapp";
(function(){var ua=navigator.userAgent||"navigator";var isIOS=/iPad|iPhone|iPod/.test(ua)&&!window.MSStream;var isIPadOS=navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1;var isAndroid=/android/i.test(ua);var iosBtn=document.getElementById("iosBtn");var androidBtn=document.getElementById("androidBtn");iosBtn.href=IOS_URL;androidBtn.href=ANDROID_URL;if(isIOS||isIPadOS){window.location.replace(IOS_URL)}else if(isAndroid){window.location.replace(ANDROID_URL)}else{document.getElementById("redirecting").style.display="none";document.getElementById("buttons").style.display="flex"}})();
</script>
</body>
</html>
